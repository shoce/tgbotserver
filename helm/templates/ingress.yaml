{{ if $.Values.IngressDomain -}}
---

apiVersion: "networking.k8s.io/v1"
kind: "Ingress"

metadata:
  name: "tgbotserver"
  namespace: "{{ $.Release.Namespace }}"
  annotations:
    kubernetes.io/ingress.allow-http: "false"
    nginx.ingress.kubernetes.io/proxy-body-size: "{{ $.Values.IngressRequestMaxBodySizeString }}"
    nginx.ingress.kubernetes.io/whitelist-source-range: "{{ $.Values.IngressWhitelistSourceRange | join ", " }}"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "333"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "333"
    nginx.ingress.kubernetes.io/proxy-request-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/server-snippet: |
      location ^~ / {
        proxy_pass https://api.telegram.org;
        proxy_set_header Host api.telegram.org;
        proxy_ssl_server_name on;
        add_header X-ApiTelegramOrg "1" always;
      }

spec:
  ingressClassName: "nginx"

  tls:
  - hosts:
    - "{{ $.Values.IngressDomain }}"

  rules: []

{{ end }}

